spring.application.name=innovationlab

# ============================================================
# BLOCO 1 — Base de Dados H2
# Guarda os dados em ficheiro (pasta /data/) para nao perder
# ao reiniciar a aplicacao
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/innovationlab
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# BLOCO 2 — Hibernate / JPA
# ddl-auto=update: cria e actualiza tabelas automaticamente
# show-sql=true: mostra o SQL gerado no terminal (util para aprender)
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# BLOCO 3 — Consola grafica H2
# Aceder em: http://localhost:8080/h2-console
# JDBC URL a usar na consola: jdbc:h2:file:./data/innovationlab
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# BLOCO 4 — Spring Security (credenciais fixas para desenvolvimento)
# A configuracao real sera feita no SecurityConfig.java (Passo 9)
# ============================================================
spring.security.user.name=admin
spring.security.user.password=admin
