spring.application.name=innovationlab

# ============================================================
# BLOCO 1 — Base de Dados H2
# Guarda os dados em ficheiro (pasta /data/) para nao perder
# ao reiniciar a aplicacao
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/innovationlab;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# BLOCO 2 — Hibernate / JPA
# ddl-auto=update: cria e actualiza tabelas automaticamente
# show-sql=true: mostra o SQL gerado no terminal (util para aprender)
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# BLOCO 3 — Consola grafica H2
# Aceder em: http://localhost:8080/h2-console
# JDBC URL a usar na consola: jdbc:h2:file:./data/innovationlab
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# BLOCO 4 — Spring Security
# A autenticacao real e feita pelo AuthUserLoader.java que
# carrega os utilizadores da base de dados H2.
# As credenciais fixas spring.security.user foram removidas
# pois nao tem efeito com UserDetailsService implementado.
# ============================================================

# ============================================================
# BLOCO 5 — ENIO: Servidor de Email (Porta 1025 - Gratuito)
# ============================================================

# Configurações do Servidor SMTP Local (Ex: Mailpit / Mailhog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

# ============================================================
# BLOCO 6 — Upload Size Limits (BioGears CSV Batch)
# ============================================================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=550MB
